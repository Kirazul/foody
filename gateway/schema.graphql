type User {
  id: ID!
  name: String!
  email: String!
  phone: String
  address: String
  created_at: String
}

type OrderItem {
  name: String!
  quantity: Int!
  price: Float!
}

type Order {
  id: ID!
  user_id: String!
  restaurant: String!
  items: [OrderItem!]!
  total: Float!
  status: String!
  delivery_address: String!
  driver_id: String
  created_at: String!
  updated_at: String!
}

type Delivery {
  id: ID!
  order_id: String!
  driver_name: String!
  status: String!
  latitude: Float!
  longitude: Float!
  pickup_address: String
  delivery_address: String
  assigned_at: String
  updated_at: String
}

type AuthPayload {
  token: String!
  user: User!
}

type OrderList {
  orders: [Order!]!
}

type DeliveryList {
  deliveries: [Delivery!]!
}

type Query {
  profile(token: String!): User
  orders(token: String!): OrderList
  order(token: String!, order_id: String!): Order
  activeDeliveries: DeliveryList
  delivery(delivery_id: String!): Delivery
}

type Mutation {
  register(name: String!, email: String!, password: String!, phone: String, address: String): AuthPayload
  login(email: String!, password: String!): AuthPayload
  createOrder(token: String!, restaurant: String!, items: [OrderItemInput!]!, delivery_address: String!): Order
  cancelOrder(token: String!, order_id: String!): Order
}

input OrderItemInput {
  name: String!
  quantity: Int!
  price: Float!
}
