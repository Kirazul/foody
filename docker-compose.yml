services:
  kafka:
    image: apache/kafka:3.7.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: foody-kafka-cluster-001
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 10

  user-service:
    build: .
    command: node services/user/src/index.js
    ports:
      - "5001:5001"
    environment:
      - KAFKA_BROKER=kafka:9092
      - JWT_SECRET=foody-secret-2026
      - USER_SERVICE_PORT=5001
    depends_on:
      kafka:
        condition: service_healthy

  order-service:
    build: .
    command: node services/order/src/index.js
    ports:
      - "5002:5002"
    environment:
      - KAFKA_BROKER=kafka:9092
      - JWT_SECRET=foody-secret-2026
      - ORDER_SERVICE_PORT=5002
    depends_on:
      kafka:
        condition: service_healthy

  delivery-service:
    build: .
    command: node services/delivery/src/index.js
    ports:
      - "5003:5003"
    environment:
      - KAFKA_BROKER=kafka:9092
      - DELIVERY_SERVICE_PORT=5003
    depends_on:
      kafka:
        condition: service_healthy

  gateway:
    build: .
    command: node gateway/src/index.js
    ports:
      - "4000:4000"
    environment:
      - GATEWAY_PORT=4000
      - USER_SERVICE_URL=user-service:5001
      - ORDER_SERVICE_URL=order-service:5002
      - DELIVERY_SERVICE_URL=delivery-service:5003
    depends_on:
      - user-service
      - order-service
      - delivery-service
